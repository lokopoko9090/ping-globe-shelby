<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Global Ping Monitor</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://unpkg.com/three"></script>
  <script src="https://unpkg.com/globe.gl"></script>
</head>
<body>
  <h1>🌍 Global Ping Monitor</h1>

  <p id="location">Твоя локація: визначається...</p>
  <p id="ping">Останній пінг: немає даних</p>
  <p id="wallet">Wallet: не підключено</p>

  <div id="globeViz"></div>

  <div class="controls">
    <button onclick="runPing()">Запустити Ping</button>
    <button onclick="connectWallet()">Підключити Petra Wallet</button>
    <button onclick="saveToShelby()">Зберегти в Shelby</button>
    <button onclick="exportJSON()">Експорт JSON</button>
  </div>

  <p id="status">Статус: готовий</p>

  <script src="app.js"></script>
</body>
</html>
